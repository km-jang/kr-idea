name: 데이터 갱신

on:
  schedule:
    - cron: "10 10 * * 1-5"   # 매 영업일 19:10 KST - 데이터 수집
    - cron: "0 23 * * 0-4"    # 매 영업일 08:00 KST - 아침 브리핑 발송
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 오프라인 테스트
        if: github.event.schedule != '0 23 * * 0-4'
        run: python test_parsers.py

      - name: 데이터 수집
        if: github.event.schedule != '0 23 * * 0-4'
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python collect.py

      - name: 커밋 & 푸시
        if: github.event.schedule != '0 23 * * 0-4'
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add data.json history/ 2>/dev/null || git add data.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "data: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
            git push
          fi

      - name: 텔레그램 브리핑 발송
        if: github.event.schedule == '0 23 * * 0-4' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py
