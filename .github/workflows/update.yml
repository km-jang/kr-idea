name: 데이터 갱신

on:
  schedule:
    - cron: "10 10 * * 1-5"   # 매 영업일 19:10 KST - 데이터 수집 + 마감 요약
    - cron: "0 23 * * 0-4"    # 매 영업일 08:00 KST - 아침 브리핑 발송
    - cron: "0 9 * * 0"       # 일요일 18:00 KST - 주간 결산 발송
    - cron: "50 5 * * 1-5"    # 매 영업일 14:50 KST - 종가매매 스캔
    - cron: "40 10 * * 1-5"   # 매 영업일 19:40 KST - 예비 알람 (본 수집 누락 시에만 작동)
    - cron: "25 23 * * 0-4"   # 매 영업일 08:25 KST - 아침 예비 알람 (본 발송 누락 시에만)
    - cron: "5 3 * * 1-5"    # 매 영업일 12:05 KST - 장중 시황 요약 (점심 맥박)
    - cron: "35 3 * * 1-5"    # 매 영업일 12:35 KST - 점심 맥박 예비 (본 발송 누락 시에만)
    - cron: "7 6 * * 1-5"     # 매 영업일 15:07 KST - 종가 스캔 예비 (본 스캔 누락 시에만)
    - cron: "30 12 * * 1-5"   # 매 영업일 21:30 KST - 야간 자가 점검 (수집 반영 감시)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 오프라인 테스트
        if: github.event.schedule == '10 10 * * 1-5' || github.event_name == 'workflow_dispatch'
        run: python test_parsers.py

      - name: 데이터 수집
        if: github.event.schedule == '10 10 * * 1-5' || github.event_name == 'workflow_dispatch'
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python collect.py

      - name: 커밋 & 푸시
        if: github.event.schedule == '10 10 * * 1-5' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add data.json history/ 2>/dev/null || git add data.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "data: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
            git push
          fi

      - name: 아침 브리핑 발송
        if: github.event.schedule == '0 23 * * 0-4' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python notify.py
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add sent_log.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "log: 아침 발송 기록" && git push)

      - name: 아침 예비 발송 (08:25, 본 발송 누락 시에만)
        if: github.event.schedule == '25 23 * * 0-4'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python notify.py --if-not-sent
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add sent_log.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "log: 아침 예비 발송 기록" && git push)

      - name: 마감 요약 발송
        if: github.event.schedule == '10 10 * * 1-5'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python notify.py --evening
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add sent_log.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "log: 저녁 발송 기록" && git push)

      - name: 주간 결산 발송
        if: github.event.schedule == '0 9 * * 0'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py --weekly

      - name: 예비 수집·발송 (19:40, 본 수집 누락 시에만)
        if: github.event.schedule == '40 10 * * 1-5'
        continue-on-error: true
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          HAVE=$(python -c "import json;print(json.load(open('data.json')).get('market_date',''))" 2>/dev/null || echo "")
          GEN=$(python -c "import json;print(json.load(open('data.json')).get('generated_at',''))" 2>/dev/null || echo "")
          FINAL=$(python -c "g='$GEN'; print('yes' if g[:10]=='$TODAY' and g[11:16]>='15:40' else 'no')")
          if [ "$FINAL" = "yes" ]; then
            echo "본 수집 완료 확인(마감 후 수집 $GEN) — 예비 알람 조용히 종료"
            exit 0
          fi
          echo "본 수집 누락 감지(현재 데이터: $HAVE / 생성 $GEN) — 예비 수집 시작"
          python test_parsers.py
          python collect.py
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add data.json history/ 2>/dev/null || git add data.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "data(예비): $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
            git push
          fi
          NEWDATE=$(python -c "import json;print(json.load(open('data.json')).get('market_date',''))" 2>/dev/null || echo "")
          if [ "$NEWDATE" = "$TODAY" ]; then
            python notify.py --evening
          else
            echo "휴장일 등으로 새 데이터 없음 — 발송 생략"
          fi

      - name: 장중 시황 요약 (12:05)
        if: github.event.schedule == '5 3 * * 1-5'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python closing_scan.py --pulse
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add sent_log.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "log: 점심 발송 기록" && git push)

      - name: 점심 맥박 예비 (12:35, 본 발송 누락 시에만)
        if: github.event.schedule == '35 3 * * 1-5'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python closing_scan.py --pulse --if-not-sent
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add sent_log.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "log: 점심 예비 발송 기록" && git push)

      - name: 종가 스캔 예비 (15:07, 본 스캔 누락 시에만)
        if: github.event.schedule == '7 6 * * 1-5'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          DONE=$(python -c "import json;rs=json.load(open('scans.json'));print('yes' if any(r.get('date')=='$TODAY' for r in rs) else 'no')" 2>/dev/null || echo "no")
          if [ "$DONE" = "yes" ]; then echo "본 스캔 완료 확인 - 예비 조용히 종료"; exit 0; fi
          echo "본 스캔 누락 감지 - 예비 스캔 시작"
          python closing_scan.py
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add scans.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "scan(예비): $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')" && git push)

      - name: 야간 자가 점검 (21:30, 수집 반영 감시 + 자동 복구)
        if: github.event.schedule == '30 12 * * 1-5'
        continue-on-error: true
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then echo "시크릿 없음 - 생략"; exit 0; fi
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          GEN=$(python -c "import json;print(json.load(open('data.json')).get('generated_at',''))" 2>/dev/null || echo "")
          FRESH=$(python -c "g='$GEN'; print('yes' if g[:10]=='$TODAY' and g[11:16]>='15:40' else 'no')")
          if [ "$FRESH" = "yes" ]; then echo "자가 점검 통과 (수집 $GEN)"; exit 0; fi
          echo "마감 수집 미반영 감지 (현재: $GEN) — 자동 복구 시도"
          RECOVER=fail
          NEWGEN=""
          if python test_parsers.py && python collect.py; then
            git config user.name "dashboard-bot"
            git config user.email "actions@github.com"
            git add data.json history/ 2>/dev/null || git add data.json
            git diff --cached --quiet || (git commit -m "data(자가복구): $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')" && git push)
            NEWGEN=$(python -c "import json;print(json.load(open('data.json')).get('generated_at',''))" 2>/dev/null || echo "")
            NEWFRESH=$(python -c "g='$NEWGEN'; print('yes' if g[:10]=='$TODAY' and g[11:16]>='15:40' else 'no')")
            if [ "$NEWFRESH" = "yes" ]; then
              RECOVER=ok
              python notify.py --evening --if-not-sent || true
            fi
          fi
          if [ "$RECOVER" = "ok" ]; then
            MSG="🩺 야간 자가 점검: 마감 수집 누락을 발견해 자동 복구했습니다 (새 수집: $NEWGEN)
          저녁 브리핑이 미발송 상태였다면 방금 함께 발송됐습니다."
          else
            MSG="🩺 야간 자가 점검: 오늘 마감 수집이 반영되지 않았고 자동 복구도 실패했습니다 (현재 데이터: $GEN)
          휴장일이면 정상입니다. 평일이라면 Actions 로그 확인 후 Run workflow로 수동 수집을 권장합니다.
          https://github.com/${{ github.repository }}/actions"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" --data-urlencode text="$MSG" > /dev/null || true

      - name: 종가매매 스캔
        if: github.event.schedule == '50 5 * * 1-5'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python closing_scan.py
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add scans.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "scan: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')" && git push)

      - name: 실패 자동 통보
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then echo "시크릿 없음 - 통보 생략"; exit 0; fi
          MSG="🚨 자동화 실행 실패 ($(TZ=Asia/Seoul date '+%m/%d %H:%M KST'))
          어떤 단계가 실패했는지 GitHub Actions 로그를 확인하세요.
          복구 방법: 저장소의 PLAYBOOK.md 참고
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" --data-urlencode text="$MSG" > /dev/null || true
