name: 데이터 갱신

on:
  schedule:
    - cron: "10 10 * * 1-5"   # 매 영업일 19:10 KST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 오프라인 테스트
        run: python test_parsers.py

      - name: 데이터 수집
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python collect.py

      - name: 커밋 & 푸시
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add data.json history/ 2>/dev/null || git add data.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "data: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
            git push
          fi
